<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeFinder</title>
    <style>
        /*RESPONSIVE DESIGN */

/* Tablet Styles */
@media screen and (max-width: 768px) {
    .container {
        padding: 15px;
    }

    .card {
        padding: 30px;
    }

    h1 {
        font-size: 26px;
    }

    h2 {
        font-size: 18px;
    }

    input {
        padding: 10px;
        font-size: 15px;
    }

    button {
        padding: 10px;
        font-size: 15px;
    }
}

/* Mobile Styles */
@media screen and (max-width: 480px) {
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 10px;
    }

    .container {
        padding: 10px;
    }

    .card {
        padding: 25px 20px;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 5px;
    }

    h2 {
        font-size: 16px;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-size: 13px;
    }

    input {
        padding: 10px;
        font-size: 14px;
    }

    button {
        padding: 12px;
        font-size: 15px;
    }

    .link {
        font-size: 14px;
        margin-top: 15px;
    }

    .error-message {
        font-size: 13px;
    }
}

/* Small Mobile Styles */
@media screen and (max-width: 360px) {
    .card {
        padding: 20px 15px;
    }

    h1 {
        font-size: 22px;
    }

    input {
        padding: 8px;
    }

    button {
        padding: 10px;
    }
}

/* Landscape Mode */
@media screen and (max-height: 600px) and (orientation: landscape) {
    body {
        min-height: auto;
        padding: 20px;
    }

    .container {
        max-width: 500px;
    }

    .card {
        padding: 25px;
    }

    .form-group {
        margin-bottom: 12px;
    }
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 20px;
            font-weight: normal;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #667eea;
        }
        
        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
            min-height: 20px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        button:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>RecipeFinder</h1>
            <h2>Welcome Back!</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email or Username</label>
                    <input type="text" id="email" placeholder="Enter your email or username" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" id="loginBtn">Login</button>
            </form>
            
            <p class="link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <script src="project.js"></script>
</body>
</html>
